name: Reusable pinprick audit # zizmor: ignore[excessive-permissions]

on:
  workflow_call:
    inputs:
      advanced-security:
        type: boolean
        required: true
      fail-on-findings:
        type: boolean
        required: true
      timeout-minutes:
        type: number
        default: 15

# Permissions inherit from the caller: SARIF consumers grant security-events,
# no-GHAS private repos grant contents only. Declaring more here than a caller
# grants fails the run at startup.

jobs:
  audit: # zizmor: ignore[excessive-permissions]
    name: Audit
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run pinprick
        uses: starhaven-io/pinprick-action@a663b6d119c2e5f4ff239bfdf155f50143e67706 # v0.4.2
        with:
          # Fork pull requests cannot upload SARIF with the read-only token.
          advanced-security: ${{ inputs.advanced-security }}
          fail-on-findings: ${{ inputs.fail-on-findings }}
