name: Warm Ruby Cache

# Bundler caches created in pull request runs are scoped to that pull request;
# only a cache created on the default branch is restorable across them.
on:
  push:
    branches:
      - main
    paths:
      - "fleet/Gemfile"
      - "fleet/Gemfile.lock"
      - "fleet/.ruby-version"
      - ".github/workflows/warm-ruby-cache.yml"

permissions: {}

concurrency:
  group: warm-ruby-cache
  cancel-in-progress: true

jobs:
  warm:
    name: Warm
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          working-directory: fleet
          bundler-cache: true
