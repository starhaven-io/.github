name: Warm Ruby Cache

# Bundler caches created in pull request runs are scoped to that pull request;
# only a cache created on the default branch is restorable across them.
on:
  push:
    branches:
      - main
    paths:
      - "fleet/Gemfile"
      - "fleet/Gemfile.lock"
      - "fleet/.ruby-version"
      - ".github/workflows/warm-ruby-cache.yml"

permissions: {}

concurrency:
  group: warm-ruby-cache
  cancel-in-progress: true

jobs:
  warm:
    name: Warm
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b # v1.321.0
        with:
          working-directory: fleet
          bundler-cache: true
