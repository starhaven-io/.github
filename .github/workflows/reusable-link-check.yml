name: Reusable Link Check

on:
  workflow_call:
    inputs:
      args:
        type: string
        required: true
      build-site:
        type: boolean
        default: false
      site-directory:
        type: string
        default: ""
      authenticated-github:
        type: boolean
        default: false

permissions: {}

defaults:
  run:
    shell: bash -xeuo pipefail {0}

jobs:
  lychee:
    name: Check links
    runs-on: ubuntu-slim
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - if: inputs.build-site
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26
          package-manager-cache: false

      - name: Install dependencies
        if: inputs.build-site && inputs.site-directory == ''
        # Fail closed on unreviewed install scripts (npm v12 default; see allowScripts in package.json).
        run: npm ci --strict-allow-scripts

      - name: Install dependencies
        if: inputs.build-site && inputs.site-directory != ''
        working-directory: ${{ inputs.site-directory }}
        # Fail closed on unreviewed install scripts (npm v12 default; see allowScripts in package.json).
        run: npm ci --strict-allow-scripts

      - name: Build site
        if: inputs.build-site && inputs.site-directory == ''
        run: npm run build

      - name: Build site
        if: inputs.build-site && inputs.site-directory != ''
        working-directory: ${{ inputs.site-directory }}
        run: npm run build

      - name: Check links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        env:
          # Check github.com links with the authenticated rate limit (1000/hr)
          # instead of the 60/hr anonymous pool, avoiding flaky 429 failures.
          GITHUB_TOKEN: ${{ inputs.authenticated-github && github.token || '' }}
        with:
          args: ${{ inputs.args }}
          fail: true
