name: Fleet Guard

on:
  pull_request:

permissions: {}

concurrency:
  group: "fleet-guard-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  guard:
    name: Guard
    permissions:
      contents: read
    uses: starhaven-io/.github/.github/workflows/reusable-fleet-guard.yml@393adbb1228f90d27d13093b4eb8b2a6f602d7fc # v2026.07.05.7
    with:
      hub-ref: "393adbb1228f90d27d13093b4eb8b2a6f602d7fc"
      repo-name: ${{ github.event.repository.name }}
