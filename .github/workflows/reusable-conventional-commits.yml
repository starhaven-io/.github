name: Reusable Conventional Commits

on:
  workflow_call:

permissions: {}

jobs:
  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read # required to read PR titles
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check pull request title
        if: github.event_name == 'pull_request'
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\([^)]+\))?: .+'
          if [[ ! "${TITLE}" =~ ${PATTERN} ]]; then
            echo "::error::Pull request title must use Conventional Commits format"
            exit 1
          fi

      - name: Check pushed commits
        if: github.event_name != 'pull_request'
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          if [[ -z "${BEFORE}" || "${BEFORE}" =~ ^0+$ ]]; then
            RANGE="${AFTER}^..${AFTER}"
          else
            RANGE="${BEFORE}..${AFTER}"
          fi

          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\([^)]+\))?: .+'
          git log --format=%s "${RANGE}" | while IFS= read -r subject; do
            if [[ ! "${subject}" =~ ${PATTERN} ]]; then
              echo "::error::Commit subject must use Conventional Commits format: ${subject}"
              exit 1
            fi
          done
