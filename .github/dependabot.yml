version: 2
updates:
  - package-ecosystem: "bundler"
    directory: "/fleet"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      "bundler-dependencies":
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      exclude:
        - "starhaven-io/*"
    ignore:
      # Fleet pins are owned by the sync; Dependabot never writes them.
      - dependency-name: "starhaven-io/.github/*"
    groups:
      "github-actions":
        patterns:
          - "*"
