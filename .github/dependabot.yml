version: 2
updates:
  - package-ecosystem: "bundler"
    directory: "/fleet"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      bundler-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      exclude:
        - "starhaven-io/.github/.github/workflows/reusable-*.yml"
    groups:
      github-actions:
        patterns:
          - "*"
